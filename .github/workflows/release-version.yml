name: Release Tagged Docker Image

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish (e.g. v1.2.3)
        required: true
        type: string
      ref:
        description: Git ref to build (branch, tag, or commit SHA). Defaults to main.
        required: false
        type: string
        default: main

jobs:
  release-docker-image-jvm:
    name: Release Tagged Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Build and Push Image
        uses: explorviz/deployment/.github/actions/build-and-deploy-quarkus-jvm@main
        with:
          platforms: "linux/amd64,linux/arm64/v8"
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          image-name: ${{ vars.DOCKER_JVM_IMAGE_NAME }}
          image-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.ref_name }}
